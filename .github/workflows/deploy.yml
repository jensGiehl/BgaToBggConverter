name: Deploy to Linux Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package

      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: "target/BgaStatisticToBggCommentConverter-*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/deploy/BgaStatisticToBggCommentConverter.jar"

      - name: Create play mapping file
        run: |
          echo "${{ vars.PLAYERNAME_MAPPING }}" > defaultPlayernameMapping.properties

      - name: Copy play mapping file to server
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: "defaultPlayernameMapping.properties"
          target: "/home/${{ secrets.SERVER_USER }}/deploy/"

      - name: Deploy application on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            pkill -f 'BgaStatisticToBggCommentConverter.jar' || true
            
            sleep 5
            
            nohup java -jar /home/${{ secrets.SERVER_USER }}/deploy/BgaStatisticToBggCommentConverter.jar \
              --spring.config.additional-location=file:/home/${{ secrets.SERVER_USER }}/deploy/defaultPlayernameMapping.properties \
              > /home/${{ secrets.SERVER_USER }}/deploy/app.log 2>&1 &
